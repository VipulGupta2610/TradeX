services:

  nginx:
    image: nginx
    ports:
      - 8000:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2

  backend1:
    build: ./Backend
    env_file:
      - ./Backend/.env
    environment:
      - SERVER_NAME=PEHLA_SERVER
    ports:
      - 8001:8000
  backend2:
    build: ./Backend
    env_file:
      - ./Backend/.env
    environment:
      - SERVER_NAME=DUSRA_SERVER
    ports:
      - 8002:8000
    
  frontend:
    build: ./Frontend
    env_file:
      - ./Frontend/.env
    ports:
      - 5173:5173
    
  redis:
    image: redis
    ports:
      - 6379:6379